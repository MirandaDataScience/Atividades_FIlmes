<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmes</title>
    <link rel="stylesheet" href="style.css">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap');
    </style>

</head>
<body>

    <h1>
        Form Filmes
    </h1>

    <form>
        <p><input type="text"  id="capaFilme" placeholder="Capa do filme"></p>
        <p><input type="text"  id="nomeFilme" placeholder="Digite o nome do filme "></p>
        <p><input type="text"  id="generoFilme" placeholder="Digite o gênero do filme "></p>
        <p><input type="text"  id="anoFilme" placeholder="Digite o ano do filme "></p>
        <p><button id="Btn">Gravar</button></p>
    </form>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD9QoolnsS4YkMGxL8aX8JFuQU0OuM-kUI",
        authDomain: "atividade-bd-876d1.firebaseapp.com",
        projectId: "atividade-bd-876d1",
        storageBucket: "atividade-bd-876d1.firebasestorage.app",
        messagingSenderId: "644623573924",
        appId: "1:644623573924:web:bdbda4677663323b6c1731"
    };

    // Inicializa o Firebase
    const app = initializeApp(firebaseConfig);
    
    // Agora o getFirestore vai funcionar porque foi importado corretamente
    const db = getFirestore(app);

    const pegaCapa = document.getElementById("capaFilme");
    const pegaNome = document.getElementById("nomeFilme");
    const pegaGenero = document.getElementById("generoFilme");
    const pegaAno = document.getElementById("anoFilme");
    const pegaBtn = document.getElementById("Btn");

    pegaBtn.addEventListener("click", async (event) => {
        event.preventDefault(); // Impede o refresh da página

        try {
            const docRef = await addDoc(collection(db, "filmes"), {
                capa: pegaCapa.value,
                nome: pegaNome.value,
                genero: pegaGenero.value,
                ano: pegaAno.value
            });
            console.log("Documento escrito com ID: ", docRef.id);
            alert("Sucesso!");
        } catch (e) {
            console.error("Erro ao adicionar: ", e);
        }
    });

    const listaContainer = document.getElementById("listaFilmes");

        async function renderizarFilmes() {
            listaContainer.innerHTML = "<p>Carregando filmes...</p>";

           try {
                const q = query(collection(db, "filmes"));
                const querySnapshot = await getDocs(q);

                listaContainer.innerHTML = "";

                querySnapshot.forEach((doc) => {
                    const filme = doc.data();
                
                    listaContainer.innerHTML += `
                        <div class="card">
                            <img src="${filme.capa}" alt="Capa" style="width: 100px; display: block;">
                            <h3>${filme.nome}</h3>
                            <p><strong>Gênero:</strong> ${filme.genero}</p>
                            <p><strong>Ano:</strong> ${filme.ano}</p>
                        </div>
                     `;
                });
           } catch (error) {
                console.error("error ao buscar: ", error);
                listaContainer.innerHTML = "<p>Erro ao carregar lista.</p>";
           }
        }

        renderizarFilmes();

</script>

    <hr>
    <h2>Lista de Filmes</h2>
    <div id="listaFilmes"></div>



</body>
</html>
