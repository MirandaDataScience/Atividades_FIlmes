<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravar no firebase</title>
</head>
<body>

    <h1>
        form firebase
    </h1>

    <form>
        <p><input type="text"  id="capaFilme" placeholder="Capa do filme"></p>
        <p><input type="text"  id="nomeFilme" placeholder="Digite o nome do filme "></p>
        <p><input type="text"  id="generoFilme" placeholder="Digite o gênero do filme "></p>
        <p><input type="text"  id="anoFilme" placeholder="Digite o ano do filme "></p>
        <p><button id="Btn">Gravar</button></p>
    </form>

    <script type="module">

        
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        // TODO: Add SDKs for Firebase products that you want to use
        // https://firebase.google.com/docs/web/setup#available-libraries

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD9QoolnsS4YkMGxL8aX8JFuQU0OuM-kUI",
            authDomain: "atividade-bd-876d1.firebaseapp.com",
            projectId: "atividade-bd-876d1",
            storageBucket: "atividade-bd-876d1.firebasestorage.app",
            messagingSenderId: "644623573924",
            appId: "1:644623573924:web:bdbda4677663323b6c1731"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const pegaCapa = document.getElementById("capaFilme");
        const pegaNome = document.getElementById("nomeFilme");
        const pegaGenero = document.getElementById("generoFilme");
        const pegaAno = document.getElementById("anoFilme");
        const pegaBtn = document.getElementById("Btn");
       

        pegaBtn.addEventListener("click", async (event) => {
                    
            event.preventDefault();

            try{
                const docRef = await addDoc(collection(db, "filmes"), {
                capa: pegaCapa.value,
                nome: pegaNome.value,
                genero: pegaGenero.value,
                ano: pegaAno.value,
                dataCriacao: new Date()
            });

            console.log("documento gravado com id: ", docRef.id);
            alert("Filme fravado com sucesso!");

            pegaCapa   = "";  
            pegaNome  = "";
            pegaGenero = ""; 
            pegaAno  = "";         

            } catch (e) {
                console.error("Erro ao adcionar documento: ", e);
                alert("Erro ao gravar dados.")
            };
        });
    </script>
</body>
</html>
